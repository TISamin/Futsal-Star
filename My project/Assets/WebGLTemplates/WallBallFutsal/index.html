<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Wall Ball Futsal</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #0b0f19;
        font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }
      #game-container {
        position: relative;
        width: 1280px;
        height: 720px;
        max-width: 100vw;
        max-height: 56.25vw; /* Maintain 16:9 ratio */
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        border-radius: 12px;
        overflow: hidden;
        background: #000;
        border: 2px solid #1f2937;
      }
      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        transition: opacity 0.5s ease-out;
      }
      .spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #10b981;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: 2px;
        background: linear-gradient(90deg, #10b981, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        font-size: 14px;
        color: #94a3b8;
        margin-bottom: 30px;
      }
      #progress-bar {
        width: 250px;
        height: 6px;
        background-color: #334155;
        border-radius: 3px;
        overflow: hidden;
      }
      #progress-bar-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #10b981, #3b82f6);
        transition: width 0.1s ease-out;
      }
      .instructions {
        margin-top: 20px;
        font-size: 12px;
        color: #64748b;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="unity-canvas" width="1280" height="720"></canvas>
      <div id="loading-overlay">
        <div class="title">WALL BALL FUTSAL</div>
        <div class="subtitle">PREMIUM 2.5D FUTSAL PROTOTYPE</div>
        <div class="spinner"></div>
        <div id="progress-bar">
          <div id="progress-bar-fill"></div>
        </div>
        <div class="instructions">
          Use WASD/Arrows to Move • Space to Shoot • L to Pass • I to Lob Pass • J to Switch Player • K to Auto-Sprint
        </div>
      </div>
    </div>

    <script>
      var container = document.querySelector("#game-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingOverlay = document.querySelector("#loading-overlay");
      var progressBarFill = document.querySelector("#progress-bar-fill");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFill.style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          loadingOverlay.style.opacity = 0;
          setTimeout(() => {
            loadingOverlay.style.display = "none";
          }, 500);
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
